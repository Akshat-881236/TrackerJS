<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>
TrackerJS Dashboard
</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Bootstrap Icons -->
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<!-- html2canvas -->
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<!-- jsPDF -->
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<style>

/* =====================================================
   GLOBAL
===================================================== */

body{

	background:#0f172a;
	color:#fff;

	font-family:
	system-ui,
	Arial;

	overflow-x:hidden;
}

/* =====================================================
   SCROLLBAR
===================================================== */

::-webkit-scrollbar{

	width:10px;
	height:10px;
}

::-webkit-scrollbar-thumb{

	background:#334155;
	border-radius:20px;
}

/* =====================================================
   GLASS
===================================================== */

.glass{

	background:
	rgba(255,255,255,.06);

	backdrop-filter:
	blur(12px);

	border:
	1px solid
	rgba(255,255,255,.08);
}

/* =====================================================
   SPA
===================================================== */

.spa-page{

	display:none;
}

.spa-page.active{

	display:block;
}

/* =====================================================
   LOG TABLE
===================================================== */

.log-grid{

	display:grid;

	grid-template-columns:
	120px
	1fr
	180px;

	gap:14px;

	align-items:center;

	padding:14px;

	border-bottom:
	1px solid
	rgba(255,255,255,.08);
}

.log-grid:hover{

	background:
	rgba(255,255,255,.04);
}

/* =====================================================
   ACTIONS
===================================================== */

.action-btn{

	width:38px;
	height:38px;

	display:flex;
	align-items:center;
	justify-content:center;

	border-radius:12px;

	cursor:pointer;

	transition:.25s;
}

.action-btn:hover{

	transform:translateY(-2px);
}

/* =====================================================
   DIAGNOSE CARD
===================================================== */

.diag-card{

	padding:18px;

	border-radius:22px;

	margin-bottom:18px;
}

/* =====================================================
   MOBILE
===================================================== */

@media(max-width:768px){

	.log-grid{

		grid-template-columns:
		1fr;

		gap:10px;
	}

	.log-actions{

		justify-content:flex-start;
	}
}

/* =====================================================
   SMALL DEVICES
===================================================== */

@media(max-width:480px){

	.main-container{

		padding:12px;
	}

	.diag-card{

		padding:14px;
	}

	h1{

		font-size:1.4rem !important;
	}
}

/* =====================================================
   TABLET
===================================================== */

@media(min-width:769px)
and
(max-width:1024px){

	.main-container{

		padding:20px;
	}
}

/* =====================================================
   LARGE SCREEN
===================================================== */

@media(min-width:1440px){

	.main-container{

		max-width:1700px;
		margin:auto;
	}
}

</style>
</head>
<body>

<div class="main-container
min-h-screen
p-4 md:p-6 lg:p-8">

<!-- =====================================================
     HEADER
===================================================== -->

<div class="glass
rounded-3xl
p-6
mb-6">

	<div class="
	flex
	flex-col
	md:flex-row
	md:items-center
	md:justify-between
	gap-4">

		<div>

			<h1 class="
			text-3xl
			font-bold">

				TrackerJS Dashboard

			</h1>

			<p class="
			text-slate-300
			mt-2">

				Advanced Navigation
				Intelligence Engine

			</p>

		</div>

		<div class="
		flex
		gap-3">

			<button
			onclick="showSPA('logs')"
			class="
			bg-indigo-600
			hover:bg-indigo-700
			px-5
			py-3
			rounded-2xl">

				All Logs

			</button>

			<button
			onclick="showSPA('search')"
			class="
			bg-cyan-600
			hover:bg-cyan-700
			px-5
			py-3
			rounded-2xl">

				Search Diagnose

			</button>

			<button
			onclick="showSPA('current')"
			class="
			bg-emerald-600
			hover:bg-emerald-700
			px-5
			py-3
			rounded-2xl">

				Current Diagnose

			</button>

		</div>

	</div>

</div>

<!-- =====================================================
     PAGE 1
===================================================== -->

<div id="spa-logs"
class="spa-page active">

	<div class="
	glass
	rounded-3xl
	p-4">

		<div class="
		log-grid
		font-bold
		text-slate-300">

			<div>
				LogID
			</div>

			<div>
				Title of the Page
			</div>

			<div>
				Action Icons
			</div>

		</div>

		<div id="logs-container">

		</div>

	</div>

</div>

<!-- =====================================================
     PAGE 2
===================================================== -->

<div id="spa-search"
class="spa-page">

	<div class="
	glass
	rounded-3xl
	p-6">

		<h2 class="
		text-2xl
		font-bold
		mb-5">

			Search Diagnose

		</h2>

		<div class="
		flex
		flex-col
		md:flex-row
		gap-4">

			<input
			id="search-log-id"
			type="number"
			placeholder="Enter LogID"

			class="
			flex-1
			bg-slate-900
			border
			border-slate-700
			rounded-2xl
			p-4
			outline-none">

			<button
			onclick="searchDiagnose()"

			class="
			bg-indigo-600
			hover:bg-indigo-700
			px-6
			rounded-2xl">

				Search

			</button>

		</div>

		<div
		id="search-result"
		class="mt-6">

		</div>

	</div>

</div>

<!-- =====================================================
     PAGE 3
===================================================== -->

<div id="spa-current"
class="spa-page">

	<div class="
	glass
	rounded-3xl
	p-6">

		<h2 class="
		text-2xl
		font-bold
		mb-5">

			Current Page Diagnose

		</h2>

		<div id="current-diagnose">

		</div>

	</div>

</div>

<!-- =====================================================
     MODAL
===================================================== -->

<div id="diag-modal"
class="
fixed
inset-0
hidden
items-center
justify-center
z-50
bg-black/70
p-4">

	<div class="
	bg-slate-900
	w-full
	max-w-5xl
	max-h-[90vh]
	overflow-auto
	rounded-3xl
	p-6">

		<div class="
		flex
		justify-between
		items-center
		mb-5">

			<h2 class="
			text-2xl
			font-bold">

				Diagnosis Report

			</h2>

			<div class="
			flex
			gap-3">

				<button
				onclick="downloadPDF()"

				class="
				bg-red-600
				hover:bg-red-700
				px-4
				py-2
				rounded-xl">

					<i class="bi bi-file-earmark-pdf"></i>

				</button>

				<button
				onclick="closeModal()"

				class="
				bg-slate-700
				hover:bg-slate-600
				px-4
				py-2
				rounded-xl">

					<i class="bi bi-x-lg"></i>

				</button>

			</div>

		</div>

		<div id="modal-content">

		</div>

	</div>

</div>

</div>

<!-- =====================================================
     SCRIPT
===================================================== -->

<script>

/* =====================================================
   SPA
===================================================== */

function showSPA(name){

	document
	.querySelectorAll(".spa-page")
	.forEach(page=>{

		page.classList.remove("active");
	});

	document
	.getElementById(
		"spa-" + name
	)
	.classList.add("active");
}

/* =====================================================
   LOAD LOGS
===================================================== */

async function loadLogs(){

	if(!window.TrackerJS){

		alert(
			"TrackerJS Missing"
		);

		return;
	}

	const logs =
		await TrackerJS.getLogs();

	const container =
		document.getElementById(
			"logs-container"
		);

	container.innerHTML = "";

	logs.reverse().forEach(log=>{

		const row =
			document.createElement("div");

		row.className =
			"log-grid";

		row.innerHTML = `

		<div class="font-bold">

			${log.id}

		</div>

		<div>

			<div class="font-semibold">

				${escapeHTML(
					log.title
				)}

			</div>

			<div class="
			text-slate-400
			text-sm
			mt-1">

				${escapeHTML(
					log.url
				)}

			</div>

		</div>

		<div class="
		log-actions
		flex
		gap-3
		justify-end">

			<div
			class="
			action-btn
			bg-indigo-600"

			onclick="
			viewDiagnose(
				${log.id}
			)">

				<i class="
				bi bi-activity">
				</i>

			</div>

			<div
			class="
			action-btn
			bg-emerald-600"

			onclick="
			testLiveURL(
				${log.id}
			)">

				<i class="
				bi bi-box-arrow-up-right">
				</i>

			</div>

			<div
			class="
			action-btn
			bg-red-600"

			onclick="
			deleteLog(
				${log.id}
			)">

				<i class="
				bi bi-trash">
				</i>

			</div>

		</div>
		`;

		container.appendChild(row);
	});
}

/* =====================================================
   VIEW DIAGNOSE
===================================================== */

async function viewDiagnose(id){

	const logs =
		await TrackerJS.getLogs();

	const log =
		logs.find(
			x=>x.id==id
		);

	if(!log){

		alert("Log Missing");

		return;
	}

	const modal =
		document.getElementById(
			"diag-modal"
		);

	modal.classList.remove(
		"hidden"
	);

	modal.classList.add(
		"flex"
	);

	document
	.getElementById(
			"modal-content"
	)
	.innerHTML = buildDiagnoseHTML(
		log
	);
}

/* =====================================================
   BUILD DIAGNOSE
===================================================== */

function buildDiagnoseHTML(log){

	return `

	<div id="pdf-area">

		<div class="
		diag-card
		glass">

			<h3 class="
			text-xl
			font-bold
			mb-4">

				Page Information

			</h3>

			<div class="
			grid
			md:grid-cols-2
			gap-4">

				${field(
					"Title",
					log.title
				)}

				${field(
					"URL",
					log.url
				)}

				${field(
					"Timestamp",
					log.timestamp
				)}

				${field(
					"Previous URL",
					log.previousURL
				)}

				${field(
					"Log ID",
					log.id
				)}

				${field(
					"Trusted",
					String(log.trusted)
				)}

			</div>

		</div>

		<div class="
		diag-card
		glass">

			<h3 class="
			text-xl
			font-bold
			mb-4">

				Performance

			</h3>

			<div class="
			grid
			md:grid-cols-2
			gap-4">

				${field(
					"Load Time",
					log.diagnosis
					.pageLoadTime + "ms"
				)}

				${field(
					"DOM Complete",
					log.diagnosis
					.domComplete + "ms"
				)}

				${field(
					"Redirect Count",
					log.diagnosis
					.redirectCount
				)}

			</div>

		</div>

		<div class="
		diag-card
		glass">

			<h3 class="
			text-xl
			font-bold
			mb-4">

				Console Errors

			</h3>

			<pre class="
			overflow-auto
			text-sm
			text-red-300">

${JSON.stringify(
	log.diagnosis.consoleErrors,
	null,
	2
)}

			</pre>

		</div>

	</div>
	`;
}

function field(label,value){

	return `

	<div class="
	bg-slate-900/60
	p-4
	rounded-2xl">

		<div class="
		text-slate-400
		text-sm">

			${label}

		</div>

		<div class="
		mt-1
		break-all">

			${escapeHTML(
				String(value || "-")
			)}

		</div>

	</div>
	`;
}

/* =====================================================
   PDF
===================================================== */

async function downloadPDF(){

	const area =
		document.getElementById(
			"pdf-area"
		);

	const canvas =
		await html2canvas(area);

	const img =
		canvas.toDataURL(
			"image/png"
		);

	const {
		jsPDF
	} = window.jspdf;

	const pdf =
		new jsPDF(
			"p",
			"mm",
			"a4"
		);

	const width = 190;

	const height =
		canvas.height *
		width /
		canvas.width;

	pdf.addImage(
		img,
		"PNG",
		10,
		10,
		width,
		height
	);

	pdf.save(
		"diagnose-report.pdf"
	);
}

/* =====================================================
   SEARCH
===================================================== */

async function searchDiagnose(){

	const id =
		document
		.getElementById(
			"search-log-id"
		)
		.value;

	if(!id) return;

	viewDiagnose(id);
}

/* =====================================================
   CURRENT PAGE
===================================================== */

async function loadCurrentDiagnose(){

	const logs =
		await TrackerJS.getLogs();

	if(!logs.length) return;

	const latest =
		logs[
			logs.length - 1
		];

	document
	.getElementById(
		"current-diagnose"
	)
	.innerHTML =
		buildDiagnoseHTML(
			latest
		);
}

/* =====================================================
   LIVE TEST
===================================================== */

async function testLiveURL(id){

	const logs =
		await TrackerJS.getLogs();

	const log =
		logs.find(
			x=>x.id==id
		);

	if(!log) return;

	const url =
		new URL(log.url);

	url.searchParams.set(
		"anh_return_dashboard",
		location.href
	);

	url.searchParams.set(
		"anh_test_log_id",
		id
	);

	window.open(
		url.toString(),
		"_blank"
	);
}

/* =====================================================
   DELETE
===================================================== */

async function deleteLog(id){

	const db =
		await TrackerJS.openDB();

	const tx =
		db.transaction(
			"logs",
			"readwrite"
		);

	tx.objectStore(
		"logs"
	)
	.delete(id);

	loadLogs();
}

/* =====================================================
   MODAL
===================================================== */

function closeModal(){

	document
	.getElementById(
			"diag-modal"
	)
	.classList.add(
		"hidden"
	);

	document
	.getElementById(
			"diag-modal"
	)
	.classList.remove(
		"flex"
	);
}

/* =====================================================
   ESCAPE
===================================================== */

function escapeHTML(str){

	return String(str)
	.replace(/&/g,"&amp;")
	.replace(/</g,"&lt;")
	.replace(/>/g,"&gt;")
	.replace(/"/g,"&quot;");
}

/* =====================================================
   START
===================================================== */

loadLogs();

loadCurrentDiagnose();

</script>

</body>
</html>
